# 배포용: 프라이빗 레지스트리 이미지를 받아 실행한다.
# 서버에 이 파일과 .env 만 두면 됨 (소스 clone 불필요):
#   cp .env.example .env     # BOT_TOKEN 채우기 (CHANNEL_IDS는 선택 — 보통 디스코드 /cafe channel add)
#   docker compose up -d
services:
  bot:
    image: portainer.startupcode.kr/discord-cafe-noti:latest
    container_name: discord-cafe-noti
    restart: unless-stopped
    pull_policy: always # up 할 때마다 최신 이미지 확인
    env_file: .env
    environment:
      TZ: Asia/Seoul
    volumes:
      - ./data:/app/data # 주문 기록·세션 영속
      - ./logs:/app/logs # 로그
